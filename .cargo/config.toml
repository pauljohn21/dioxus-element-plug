[build]
# Enable incremental compilation in debug mode
incremental = true

[target.wasm32-unknown-unknown]
# Enable WASM-specific optimizations
runner = "wasm-server-runner"

[alias]
# Custom aliases for easier development
dev = "run --features dev"
build-css = "run --bin build-css"

# Development profile
[profile.dev]
opt-level = 0
debug = true
lto = false
rpath = false
incremental = true
codegen-units = 256

# Release profile
[profile.release]
opt-level = "z"
debug = false
lto = true
rpath = false
incremental = false
codegen-units = 1
panic = "abort"

# Test profile
[profile.test]
opt-level = 0
debug = true
