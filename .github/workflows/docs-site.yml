name: Deploy Documentation Site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli@0.7.9 --locked

      - name: Build Documentation Site
        working-directory: ./docs-site
        run: dx build --release

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Copy build output
        run: |
          # Dioxus build output is in docs-site/target/dx/*/release/web/public
          echo "Looking for build output..."
          ls -la docs-site/target/dx/ 2>/dev/null || echo "No docs-site/target/dx/"
          
          # Try to find the public directory
          BUILD_DIR=$(find docs-site/target/dx -name "public" -type d 2>/dev/null | head -1)
          
          # If not found, try the known path pattern
          if [ -z "$BUILD_DIR" ]; then
            PROJECT_NAME="dioxus-element-plug-docs"
            KNOWN_PATH="docs-site/target/dx/${PROJECT_NAME}/release/web/public"
            if [ -d "$KNOWN_PATH" ]; then
              BUILD_DIR="$KNOWN_PATH"
            fi
          fi
          
          if [ -z "$BUILD_DIR" ]; then
            echo "Error: Could not find build output directory"
            echo "Contents of docs-site/target:"
            find docs-site/target -type d 2>/dev/null | head -20
            exit 1
          fi
          
          echo "Found build output at: $BUILD_DIR"
          ls -la "$BUILD_DIR"
          
          mkdir -p docs-site/dist
          cp -r "$BUILD_DIR"/* docs-site/dist/
          
          echo "Copied to docs-site/dist:"
          ls -la docs-site/dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'docs-site/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
