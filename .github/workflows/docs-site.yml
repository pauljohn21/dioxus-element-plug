name: Deploy Documentation Site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli@0.7.9 --locked

      - name: Build Documentation Site
        working-directory: ./docs-site
        run: dx build --release

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Copy build output
        working-directory: ./docs-site
        run: |
          # Dioxus build output is in target/dx/*/release/web/public
          BUILD_DIR=$(find target/dx -name "public" -type d 2>/dev/null | head -1)
          if [ -z "$BUILD_DIR" ]; then
            echo "Error: Could not find build output directory"
            exit 1
          fi
          echo "Found build output at: $BUILD_DIR"
          mkdir -p dist
          cp -r "$BUILD_DIR"/* dist/
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './docs-site/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
